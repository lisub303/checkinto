<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cover {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }

        /* 이미지 위에 로딩바 오버레이 */
        .loading-bar-wrap {
            position: absolute;
            /* 이미지 내 로딩바 위치에 맞게 조정 */
            bottom: 18%;
            left: 50%;
            transform: translateX(-50%);
            width: 52%;
            height: 28px;
        }

        /* 실제 채워지는 바 — 이미지 로딩바 위에 겹침 */
        .loading-bar-fill {
            position: absolute;
            top: 3px;
            left: 6px;
            height: calc(100% - 6px);
            width: 0%;
            background: #1a1a1a;
            border-radius: 20px;
            transition: width 0.05s linear;
        }

        body.fade-out {
            animation: fadeOut 0.5s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="cover">
        <img src="https://raw.githubusercontent.com/lisub303/checkinto/main/passportcover.jpg"
             alt="loading" id="coverImg">
        <div class="loading-bar-wrap">
            <div class="loading-bar-fill" id="barFill"></div>
        </div>
    </div>

    <script>
        const bar = document.getElementById('barFill');
        let progress = 0;
        const duration = 2200; // 총 로딩 시간 ms
        const interval = 30;
        const step = 100 / (duration / interval);

        const timer = setInterval(() => {
            progress = Math.min(progress + step, 100);
            bar.style.width = progress + '%';

            if (progress >= 100) {
                clearInterval(timer);
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 500);
            }
        }, interval);
    </script>
</body>
</html>
